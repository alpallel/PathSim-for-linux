name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a tag like "v1.0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'

      - name: Package the files
        run: |
          mkdir PathSim-Installer
          cp PathSim.jar install.sh uninstall.sh README.md PathSim-Installer/
          zip -r PathSim-Linux.zip PathSim-Installer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: PathSim-Linux.zip
